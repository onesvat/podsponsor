whisper:
  model: medium
  device: cuda
  compute_type: float16
  # Smaller chunks generally produce shorter segments (trade-off: slower transcription).
  # WhisperX default is typically ~30s; Podsponsor defaults to 20 if omitted.
  chunk_size: 20

llm:
  # Summary language (also used in headings). If you want to override the built-in prompt,
  # add `prompt:` here and use `{summary_language}` in the prompt text.
  summary_language: Turkish

  # You can list multiple OpenAI-compatible API endpoints here. 
  # If the first provider hits a Rate Limit, Timeout, or API Error, the script gracefully falls back to the next one in the list.
  providers:
    - base_url: 
      model: 
      api_key: 
      timeout_seconds: 60

detection:
  similarity_threshold: 0.80
  silence_db: -40
  silence_min_duration: 1.5
  min_confidence: 0.70
  min_ad_duration: 8.0

backup:
  # Disable to skip writing any backup files.
  enabled: true
  # Relative paths are resolved from each episode directory.
  # Absolute paths are used as-is.
  location: backup
